apiVersion: v1
kind: ConfigMap
metadata:
  name: whoami-config
data:
  WHOAMI_NAME: "Moein-Cluster"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami 
spec:
  replicas: 4
  selector:
    matchLabels: 
      app: whoami 
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - image: docker.io/traefik/whoami:v1.11.0
          name: whoami
          env:
            - name: WHOAMI_NAME
              valueFrom:
                configMapKeyRef:
                  name: whoami-config
                  key: WHOAMI_NAME
          ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami-service
spec:
  selector:
    app: whoami 
  type: ClusterIP 
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-ingress
  annotations:
    kubernetes.io/ingress.class: nginx 
spec:
  rules:
  - host: whoami.12w.ir
    http:
      paths:
      - path: /
        pathType: Prefix 
        backend:
          service:
            name: whoami-service 
            port: 
              number: 80
