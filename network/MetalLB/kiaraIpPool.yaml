apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: kiara-ip-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.18.255.200-172.18.255.201
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
  - kiara-ip-pool